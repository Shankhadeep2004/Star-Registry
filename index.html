<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Star Registry</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #1a6b3a;
    --green-mid: #2d9653;
    --green-light: #e8f5ee;
    --surface: #ffffff;
    --bg: #f0f4f1;
    --border: rgba(0,0,0,0.08);
    --border-md: rgba(0,0,0,0.14);
    --text: #111827;
    --muted: #6b7280;
    --danger-bg: #fef2f2;
    --danger: #dc2626;
    --danger-border: rgba(220,38,38,0.25);
    --radius: 12px;
    --radius-lg: 18px;
  }
  html, body {
    min-height: 100vh;
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }
  .shell {
    max-width: 430px;
    margin: 0 auto;
    min-height: 100vh;
    padding-bottom: 30px;
  }

  /* HEADER */
  .header {
    background: var(--green);
    padding: 32px 22px 40px;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -50px; right: -50px;
    width: 180px; height: 180px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: -30px; left: 20px;
    width: 100px; height: 100px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.14);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 11px;
    color: rgba(255,255,255,0.85);
    letter-spacing: 0.8px;
    text-transform: uppercase;
    margin-bottom: 14px;
    font-weight: 500;
  }
  .badge svg { width: 11px; height: 11px; flex-shrink: 0; }
  .header-title {
    font-family: 'DM Serif Display', serif;
    font-size: 30px;
    color: white;
    line-height: 1.1;
    margin-bottom: 6px;
  }
  .header-sub {
    font-size: 13px;
    color: rgba(255,255,255,0.55);
  }

  /* CARD */
  .card {
    background: var(--surface);
    margin: -16px 14px 14px;
    border-radius: var(--radius-lg);
    border: 0.5px solid var(--border);
    padding: 22px 20px;
    position: relative;
    z-index: 1;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  .section-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--green);
    margin-bottom: 12px;
  }

  /* AUTO GRID */
  .auto-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 18px;
  }
  .auto-item {
    background: var(--bg);
    border-radius: var(--radius);
    border: 0.5px solid var(--border);
    padding: 10px 12px;
  }
  .auto-item-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 3px;
  }
  .auto-item-value {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
  }

  .divider {
    border: none;
    border-top: 0.5px solid var(--border);
    margin: 18px 0;
  }

  /* FIELDS */
  .field { margin-bottom: 14px; }
  .field-label {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
    display: block;
    font-weight: 500;
  }
  .field-input {
    width: 100%;
    height: 48px;
    border-radius: var(--radius);
    border: 1px solid var(--border-md);
    background: var(--bg);
    padding: 0 14px;
    font-size: 15px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
    -webkit-appearance: none;
    appearance: none;
  }
  .field-input:focus {
    border-color: var(--green-mid);
    box-shadow: 0 0 0 3px rgba(45,150,83,0.1);
    background: #fff;
  }
  .row2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .amt-wrap { position: relative; }
  .amt-prefix {
    position: absolute;
    left: 14px; top: 50%;
    transform: translateY(-50%);
    font-size: 15px;
    color: var(--muted);
    pointer-events: none;
    font-weight: 500;
  }
  .amt-wrap .field-input { padding-left: 26px; }

  /* UPLOAD */
  .upload-area {
    border: 1.5px dashed var(--border-md);
    border-radius: var(--radius);
    padding: 24px 16px;
    text-align: center;
    cursor: pointer;
    background: var(--bg);
    position: relative;
    transition: all 0.15s;
  }
  .upload-area:hover { border-color: var(--green-mid); background: var(--green-light); }
  .upload-area.has-photo { border-style: solid; border-color: var(--green-mid); background: var(--green-light); }
  .upload-area.err { border-color: var(--danger); background: var(--danger-bg); }
  .upload-area input {
    position: absolute; inset: 0;
    opacity: 0; cursor: pointer;
    width: 100%; height: 100%;
  }
  .upload-icon {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: var(--green-light);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 10px;
    color: var(--green);
  }
  .upload-text { font-size: 13px; color: var(--muted); line-height: 1.6; }
  .upload-text strong { color: var(--green); font-weight: 600; }
  .preview-img {
    width: 100%;
    max-height: 170px;
    object-fit: cover;
    border-radius: 10px;
    display: none;
  }
  .file-name {
    font-size: 12px;
    color: var(--green);
    margin-top: 8px;
    font-weight: 500;
    display: none;
    word-break: break-all;
  }
  .req-tag {
    display: inline-block;
    background: var(--green-light);
    color: var(--green);
    font-size: 10px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 20px;
    margin-left: 6px;
    vertical-align: middle;
  }

  /* BUTTON */
  .submit-btn {
    width: 100%;
    height: 54px;
    border-radius: var(--radius);
    border: none;
    background: var(--green);
    color: white;
    font-size: 16px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 9px;
    margin-top: 18px;
    transition: background 0.15s, transform 0.1s;
    letter-spacing: 0.2px;
  }
  .submit-btn:hover { background: #145c31; }
  .submit-btn:active { transform: scale(0.98); }
  .submit-btn:disabled { background: #9ca3af; cursor: not-allowed; transform: none; }

  .spinner {
    width: 20px; height: 20px;
    border: 2.5px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* TOAST */
  .toast {
    margin: 0 14px 16px;
    border-radius: var(--radius);
    padding: 14px 16px;
    font-size: 14px;
    font-weight: 500;
    display: none;
    line-height: 1.5;
  }
  .toast.ok {
    background: var(--green-light);
    color: var(--green);
    border: 0.5px solid rgba(45,150,83,0.3);
  }
  .toast.err {
    background: var(--danger-bg);
    color: var(--danger);
    border: 0.5px solid var(--danger-border);
  }
</style>
</head>
<body>
<div class="shell">

  <div class="header">
    <div class="badge">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      Star Registry
    </div>
    <div class="header-title">Award a Star</div>
    <div class="header-sub">Record student achievement instantly</div>
  </div>

  <div class="card">
    <div class="section-label">Auto-filled</div>
    <div class="auto-grid">
      <div class="auto-item">
        <div class="auto-item-label">Date</div>
        <div class="auto-item-value" id="disp-date">—</div>
      </div>
      <div class="auto-item">
        <div class="auto-item-label">Star type</div>
        <div class="auto-item-value">Normal star</div>
      </div>
      <div class="auto-item">
        <div class="auto-item-label">Reason</div>
        <div class="auto-item-value">Micro test</div>
      </div>
      <div class="auto-item">
        <div class="auto-item-label">Expiry</div>
        <div class="auto-item-value" id="disp-exp">—</div>
      </div>
    </div>

    <hr class="divider">
    <div class="section-label">Student info</div>

    <div class="field">
      <label class="field-label">Student name</label>
      <input class="field-input" id="f-name" type="text" placeholder="Full name" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
    <div class="row2">
      <div class="field">
        <label class="field-label">Class</label>
        <input class="field-input" id="f-class" type="text" placeholder="e.g. 9">
      </div>
      <div class="field">
        <label class="field-label">Amount</label>
        <div class="amt-wrap">
          <span class="amt-prefix">#</span>
          <input class="field-input" id="f-amount" type="number" placeholder="0" min="0" inputmode="numeric">
        </div>
      </div>
    </div>

    <hr class="divider">
    <div class="section-label">Teacher info</div>

    <div class="row2">
      <div class="field">
        <label class="field-label">Teacher name</label>
        <input class="field-input" id="f-teacher" type="text" placeholder="Name">
      </div>
      <div class="field">
        <label class="field-label">Subject</label>
        <input class="field-input" id="f-subject" type="text" placeholder="Subject">
      </div>
    </div>

    <hr class="divider">
    <div class="section-label">
      Supporting photo
      <span class="req-tag">Required</span>
    </div>

    <div class="upload-area" id="upload-area">
      <input type="file" accept="image/*" id="f-photo" onchange="handlePhoto(this)">
      <div class="upload-icon" id="upload-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
      </div>
      <div class="upload-text" id="upload-text">
        <strong>Tap to upload photo</strong><br>JPG, PNG, HEIC supported
      </div>
      <img class="preview-img" id="preview-img" alt="Preview">
      <div class="file-name" id="file-name"></div>
    </div>

    <button class="submit-btn" id="submit-btn" onclick="submitForm()">
      <span id="btn-text">Submit Award</span>
      <div class="spinner" id="spinner"></div>
    </button>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbznyfUbjPXADVeZgfnfDUaeJAwCPoNwQFMVJaEtDh0YLrYa6SosaW8LbYqzoR2jCRks/exec";

  function pad(n) { return String(n).padStart(2, '0'); }

  function getToday() {
    const d = new Date();
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  }
  function getExpiry() {
    const d = new Date();
    d.setMonth(d.getMonth() + 6);
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  }
  function getTimestamp() {
    const d = new Date();
    return `${getToday()} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
  }

  document.getElementById('disp-date').textContent = getToday();
  document.getElementById('disp-exp').textContent = getExpiry();

  let photoBase64 = '';
  let photoName = '';

  function handlePhoto(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      photoBase64 = e.target.result.split(',')[1];
      photoName = file.name;
      const img = document.getElementById('preview-img');
      img.src = e.target.result;
      img.style.display = 'block';
      document.getElementById('upload-icon').style.display = 'none';
      document.getElementById('upload-text').style.display = 'none';
      const fn = document.getElementById('file-name');
      fn.textContent = file.name;
      fn.style.display = 'block';
      const area = document.getElementById('upload-area');
      area.classList.remove('err');
      area.classList.add('has-photo');
    };
    reader.readAsDataURL(file);
  }

  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type}`;
    t.style.display = 'block';
    if (type === 'ok') setTimeout(() => { t.style.display = 'none'; }, 4500);
  }

  function setLoading(v) {
    document.getElementById('btn-text').style.display = v ? 'none' : '';
    document.getElementById('spinner').style.display = v ? 'block' : 'none';
    document.getElementById('submit-btn').disabled = v;
  }

  function resetForm() {
    ['f-name','f-class','f-amount','f-teacher','f-subject'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.getElementById('f-photo').value = '';
    document.getElementById('preview-img').style.display = 'none';
    document.getElementById('upload-icon').style.display = '';
    document.getElementById('upload-text').style.display = '';
    document.getElementById('file-name').style.display = 'none';
    document.getElementById('upload-area').className = 'upload-area';
    photoBase64 = '';
    photoName = '';
  }

  async function submitForm() {
    const name    = document.getElementById('f-name').value.trim();
    const cls     = document.getElementById('f-class').value.trim();
    const amount  = document.getElementById('f-amount').value.trim();
    const teacher = document.getElementById('f-teacher').value.trim();
    const subject = document.getElementById('f-subject').value.trim();

    if (!name || !cls || !amount || !teacher || !subject) {
      showToast('Please fill in all required fields.', 'err');
      return;
    }
    if (!photoBase64) {
      document.getElementById('upload-area').classList.add('err');
      showToast('Please upload a supporting photo.', 'err');
      return;
    }

    setLoading(true);
    document.getElementById('toast').style.display = 'none';

    const payload = {
      timestamp:    getTimestamp(),
      date:         getToday(),
      student_name: name,
      class:        cls,
      star_type:    'normal_star',
      amount:       Number(amount),
      reason:       'micro test',
      expiry_date:  getExpiry(),
      active:       'active',
      teacher_name: teacher,
      subject:      subject,
      photo:        photoBase64,
      photo_name:   photoName
    };

    try {
      await fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      showToast('Star awarded successfully! Row added to sheet.', 'ok');
      resetForm();
    } catch (e) {
      showToast('Network error. Please check your connection.', 'err');
    } finally {
      setLoading(false);
    }
  }
</script>
</body>
</html>
